services:

  web:
    build:
      context: ./src/web
    container_name: scu_app
    ports:
      - 8080:80
    networks:
      app_net:
        ipv4_address: 192.28.1.12

  api:
    build:
      context: ./src/api
    container_name: scu_api
    #for testing:
    ports:
      - 3000:3000
    networks:
      app_net:
        ipv4_address: 192.28.1.14
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

  db:
    build:
      context: ./src/db
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: scu_db
    #for testing:
    ports:
      - 3307:3306
    #-----
    networks:
      app_net:
        ipv4_address: 192.28.1.16
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      LANG: C.UTF-8

volumes:
  db_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.28.0.0/16
