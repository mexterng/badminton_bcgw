server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Correct MIME types for PWA and web files
  types {
    # PWA / App specific
    application/manifest+json  webmanifest;
    application/javascript     js;
    text/css                   css;
    # HTML
    text/html                  html htm shtml;
    # Images
    image/svg+xml              svg svgz;
    image/png                  png;
    image/jpeg                 jpeg jpg;
    image/gif                  gif;
    image/webp                 webp;
    image/x-icon               ico;
    # Fonts
    font/woff                  woff;
    font/woff2                 woff2;
    application/font-woff      woff;
    application/font-woff2     woff2;
    application/x-font-ttf     ttf;
    # Other
    text/xml                   xml;
    application/json           json;
  }

  location / {
    # Try to serve file or directory, fallback to index.html for Angular routing
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    # Crucial for PWA: Do not cache the main HTML file
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri /index.html;
  }

  location = /manifest.webmanifest {
    # Must be served with correct MIME type
    add_header Content-Type application/manifest+json;
    add_header Access-Control-Allow-Origin *; # Allows access from proxy
    expires 1y;
    access_log off;
  }

  # API Proxy configuration (for your backend)
  location /api/ {
    proxy_pass http://bcgw_api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pass authenticated user from future proxy manager
    proxy_set_header X-User $remote_user;
  }

  # Cache static assets (icons, images, fonts)
  location ~* \.(png|ico|json|js|css|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    access_log off;
    add_header Access-Control-Allow-Origin *;
  }
}