<div class="set-input-row" [class.inactive]="!active">
  <label class="input-label">{{ input_label }}:</label>
  <div class="inputs">
      <input [disabled]="!active" type="number" value="0" min="0" max="30">
      :
      <input [disabled]="!active" type="number" value="0" min="0" max="30">
  </div>
  <label class="winner-label">
      {{ winner_label ? '(' + winner_label + ')' : '' }}
  </label>
</div>
