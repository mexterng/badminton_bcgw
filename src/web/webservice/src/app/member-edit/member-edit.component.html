<div class="side">
  <app-header [heading]="title" />
  <div class="content">
    <p>Personendaten</p>
    <app-member-form
      #memberFormComp
      [memberData]="loadedMember"
      (save)="onSave($event)"
      (cancel)="onCancel()">
    </app-member-form>

    <div class="button-row">
      <button mat-stroked-button color="warn" (click)="memberFormComp.emitCancel()">
        Abbrechen
      </button>
      <button mat-flat-button (click)="memberFormComp.emitSave()"
        [disabled]="memberFormComp.memberForm.invalid">
        Spieler/in aktualisieren
      </button>
    </div>
  </div>
  <app-footer />
</div>
