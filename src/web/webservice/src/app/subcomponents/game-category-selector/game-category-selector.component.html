<!-- Main wrapper card for the selector component -->
<div class="game-category-card">
  <div class="game-category-form-container">
    <form class="game-category-form">

      <!-- Age class selection -->
      <div class="selection-card">
        <div class="card-subtitle">Altersklasse</div>
        <mat-button-toggle-group
          [hideSingleSelectionIndicator]="true"
          name="ageClass"
          appearance="standard"
          vertical
          aria-label="Altersklasse">
          
          <mat-button-toggle *ngFor="let option of ageOptions"
                            [value]="option.value"
                            [checked]="ageClass === option.value"
                            (click)="onToggleClick('ageClass', option.value)">
            {{ option.label }}
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <!-- Play type selection -->
      <div class="selection-card">
        <div class="card-subtitle">Spielart</div>
        <mat-button-toggle-group
          [hideSingleSelectionIndicator]="true"
          name="playType"
          appearance="standard"
          vertical
          aria-label="Spielart">
          
          <mat-button-toggle *ngFor="let option of playOptions"
                            [value]="option.value"
                            [checked]="playType === option.value"
                            (click)="onToggleClick('playType', option.value)">
            {{ option.label }}
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>

    </form>
  </div>
</div>
