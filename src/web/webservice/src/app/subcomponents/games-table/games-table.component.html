<div class="scroll-wrapper">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container *ngFor="let col of displayedColumns" [matColumnDef]="col">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        {{ getHeaderLabel(col) }}
      </th>
      <td mat-cell *matCellDef="let row">
        <ng-container *ngIf="col === 'timestamp_date'; else normalCell">
          {{ row.timestamp_date | date:'dd.MM.yyyy' }}
        </ng-container>

        <ng-template #normalCell>
          <!-- Result cell with clickable popup -->
          <span
            *ngIf="col === 'result'; else plainCell"
            class="result-cell"
            (click)="openResultPopup($event, row, $event.currentTarget)"
            [class.active]="activePopupRow === row.game_id"
          >
            {{ row[col] }}
            
            <!-- Popup container -->
            <div 
              *ngIf="activePopupRow === row.game_id" 
              class="result-popup"
              [style.left.px]="popupPosition.x"
              [style.top.px]="popupPosition.y"
              (click)="$event.stopPropagation()"
            >
              <div class="popup-content">
                <h4>Satzergebnisse</h4>
                <div class="result-details">
                  <div>Satz 1: {{ row.set_one }}</div>
                  <div>Satz 2: {{ row.set_two }}</div>
                  <div *ngIf="row.set_three">Satz 3: {{ row.set_three }}</div>
                </div>
                <button class="close-btn" (click)="closeResultPopup()">x</button>
              </div>
            </div>
          </span>

          <ng-template #plainCell>
            {{ row[col] }}
          </ng-template>
        </ng-template>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <!-- Click outside overlay --> 
  <div *ngIf="activePopupRow !== null" class="popup-overlay" (click)="closeResultPopup()" ></div>
</div>

<mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 25, 50]"></mat-paginator>
